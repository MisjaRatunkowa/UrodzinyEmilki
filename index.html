<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Urodziny Emilki</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #2b1d0e;
      color: #f5e6b8;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      border: 6px double #c9a24d;
      background: #3b2612;
    }

    h1 {
      font-size: 42px;
      color: #ffd36b;
      letter-spacing: 2px;
    }

    h2 {
      color: #d8b45a;
    }

    .zadanie {
      margin: 25px 0;
      padding: 20px;
      border: 2px solid #9b7a2f;
      background: #4a2f16;
    }

    input {
      padding: 10px;
      font-size: 18px;
      background: #f5e6b8;
      border: 2px solid #c9a24d;
      text-align: center;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      background: #8b5a1e;
      color: #fff1c1;
      border: 2px solid #d8b45a;
      cursor: pointer;
    }

    button:hover {
      background: #a66b24;
    }

    .feedback {
      font-weight: bold;
      margin-top: 10px;
    }

    #wygrana {
      display: none;
      position: fixed;
      inset: 0;
      background: #1f1207;
      color: #ffd36b;
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 30px;
    }

    #wygrana h1 {
      font-size: 80px;
    }

    #wygrana p {
      font-size: 28px;
      max-width: 800px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>⚜ Gra urodzinowa Emilki ⚜</h1>
    <p>Wpisz sześć kodów, aby ukończyć zadanie.</p>

    <div class="zadanie">
      <h2>Piramida</h2>
      <input id="kod1" placeholder="Wpisz kod">
      <button onclick="sprawdzKod(1)">Sprawdź</button>
      <p id="feedback1" class="feedback"></p>
    </div>

    <div class="zadanie">
      <h2>List</h2>
      <input id="kod2" placeholder="Wpisz kod">
      <button onclick="sprawdzKod(2)">Sprawdź</button>
      <p id="feedback2" class="feedback"></p>
    </div>

    <div class="zadanie">
      <h2>Karta</h2>
      <input id="kod3" placeholder="Wpisz kod">
      <button onclick="sprawdzKod(3)">Sprawdź</button>
      <p id="feedback3" class="feedback"></p>
    </div>

    <div class="zadanie">
      <h2>Tajemnicza skrzynia</h2>
      <input id="kod4" placeholder="Wpisz kod">
      <button onclick="sprawdzKod(4)">Sprawdź</button>
      <p id="feedback4" class="feedback"></p>
    </div>

    <div class="zadanie">
      <h2>Uwięziony element</h2>
      <input id="kod5" placeholder="Wpisz kod">
      <button onclick="sprawdzKod(5)">Sprawdź</button>
      <p id="feedback5" class="feedback"></p>
    </div>

    <div class="zadanie">
      <h2>Zagadki Sfinksa</h2>
      <input id="kod6" placeholder="Wpisz kod">
      <button onclick="sprawdzKod(6)">Sprawdź</button>
      <p id="feedback6" class="feedback"></p>
    </div>
  </div>

  <div id="wygrana">
    <h1>🏺 GRATULACJE! ⚔</h1>
    <p>Część zagadkowa już za Wami. Pora na kolejne wyzwania. </p>
  </div>

  <script>
    const poprawneKody = {
      1: "3628",
      2: "5214",
      3: "25",
      4: "5214",
      5: "A",
      6: "12"
    };

    const zaliczone = {
      1: false,
      2: false,
      3: false,
      4: false,
      5: false,
      6: false
    };

    function sprawdzKod(numer) {
      const input = document.getElementById("kod" + numer);
      const feedback = document.getElementById("feedback" + numer);
      const wpisanyKod = input.value.trim().toUpperCase();

      if (wpisanyKod === poprawneKody[numer]) {
        zaliczone[numer] = true;
        feedback.innerText = "Kod poprawny. Pradawna pieczęć została odblokowana.";
        feedback.style.color = "#9cff9c";
      } else {
        feedback.innerText = "Kod niepoprawny. Spróbujcie ponownie.";
        feedback.style.color = "#ff8a8a";
      }

      sprawdzWygrana();
    }

    function sprawdzWygrana() {
      if (
        zaliczone[1] &&
        zaliczone[2] &&
        zaliczone[3] &&
        zaliczone[4] &&
        zaliczone[5] &&
        zaliczone[6]
      ) {
        document.getElementById("wygrana").style.display = "flex";
      }
    }
  </script>

</body>
</html>
